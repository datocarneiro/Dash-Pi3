<body id="corpo" class="fundo-boas-vindas" style='background-image: url("Imagens/BACKGROUND/Tema01/backgroundExterno.jpg");'>

    <main id="main_principal">

        <form id="formulario">

            <div class="container boas_vindas">

                <!-- ===================== Modal de Login ===================== -->
                <div id="loginModalLogar" class="isVisible">
                    <div>

                        <!-- Logo -->
                        <div class="boas_vindas_logo_modal">
                            <img src="Imagens/LOGOS/Tema01/logo.png" class="boas_vindas_logo">
                        </div>

                        <!-- Formulário de Login -->
                        <div class="row boas_vindas_formulario_login">

                            <!-- Abas -->
                            <div class="col s12 z-depth-2" style="margin-bottom: 10px;">
                                <ul class="tabs">
                                    <li class="tab">
                                        <a href="#FORMULARIO_LOGAR" class="active" style="cursor: pointer;">Logar</a>
                                    </li>
                                    <li class="tab">
                                        <a href="#FORMULARIO_RECUPERAR" class="active" style="cursor: pointer;">Recuperar Senha</a>
                                    </li>
                                </ul>
                            </div>

                            <!-- ===== Aba: Logar ===== -->
                            <div id="FORMULARIO_LOGAR" class="col s12">
                                <div class="container_10">

                                    <!-- Campo: Usuário -->
                                    <div class="row">
                                        <div class="col s12 m12 l12 xl12 container_10">
                                            <div class="field_body sem_bordas tooltip_window">
                                                <div class="input-field field_container">
                                                    <input
                                                        type="text"
                                                        value=""
                                                        placeholder=" "
                                                        required
                                                        id="FORMULARIO_LOGAR_login"
                                                        name="FORMULARIO_LOGAR_login"
                                                    >
                                                    <label data-error="Campo obrigatório" for="FORMULARIO_LOGAR_login" class="field_label display-flex">
                                                        Usuário
                                                        <span class="obrigatorio">*Obrigatório</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Campo: Senha -->
                                    <div class="row">
                                        <div class="col s12 m12 l12 xl12 container_10">
                                            <div class="field_body sem_bordas tooltip_window">
                                                <div class="input-field field_container">
                                                    <input
                                                        type="password"
                                                        value=""
                                                        placeholder=" "
                                                        required
                                                        id="FORMULARIO_LOGAR_senha"
                                                        name="FORMULARIO_LOGAR_senha"
                                                    >
                                                    <label data-error="Campo obrigatório" for="FORMULARIO_LOGAR_senha" class="field_label display-flex">
                                                        Senha
                                                        <span class="obrigatorio">*Obrigatório</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Botão: Entrar -->
                                    <div class="row">
                                        <div class="col s12 m12 l12 xl12 expandir_botao">
                                            <div class="field_body field_show field_botao tooltip_window">
                                                <div class="field_container">
                                                    <button
                                                        type="button"
                                                        id="FORMULARIO_LOGAR_Entrar"
                                                        name="FORMULARIO_LOGAR_Entrar"
                                                        class="field_botao_item modal_form_botao retangulo btn solido waves-effect waves-light"
                                                        onclick="javascript:
                                                            addValorForm('coletarValores', 1);
                                                            addValorForm('botaoAcao', 'Entrar');
                                                            addValorForm('elementoTroca', 'corpo');
                                                            addValorForm('rota', 'mod=41&func=1490');
                                                            ExecAjax();"
                                                    >
                                                        <span>Entrar</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                            <!-- /FORMULARIO_LOGAR -->

                            <!-- ===== Aba: Recuperar Senha ===== -->
                            <div id="FORMULARIO_RECUPERAR" class="col s12">
                                <div class="container_10">

                                    <!-- Campo: E-mail -->
                                    <div class="row">
                                        <div class="col s12 m12 l12 xl12 container_10">
                                            <div class="field_body sem_bordas tooltip_window">
                                                <div class="input-field field_container">
                                                    <input
                                                        type="text"
                                                        value=""
                                                        placeholder=" "
                                                        required
                                                        id="FORMULARIO_RECUPERAR_email"
                                                        name="FORMULARIO_RECUPERAR_email"
                                                    >
                                                    <label data-error="Campo obrigatório" for="FORMULARIO_RECUPERAR_email" class="field_label display-flex">
                                                        E-mail
                                                        <span class="obrigatorio">*Obrigatório</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Botão: Enviar -->
                                    <div class="row">
                                        <div class="col s12 m12 l12 xl12 expandir_botao">
                                            <div class="field_body field_show field_botao tooltip_window">
                                                <div class="field_container">
                                                    <button
                                                        type="button"
                                                        id="FORMULARIO_RECUPERAR_Enviar"
                                                        name="FORMULARIO_RECUPERAR_Enviar"
                                                        class="field_botao_item modal_form_botao retangulo btn solido waves-effect waves-light"
                                                        onclick="javascript:
                                                            addValorForm('coletarValores', 1);
                                                            addValorForm('botaoAcao', 'Enviar');
                                                            addValorForm('elementoTroca', 'corpo');
                                                            addValorForm('rota', 'mod=41&func=1490');
                                                            ExecAjax();"
                                                    >
                                                        <span>Enviar</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                            <!-- /FORMULARIO_RECUPERAR -->

                        </div>
                        <!-- /row boas_vindas_formulario_login -->

                    </div>
                </div>
                <!-- /loginModalLogar -->

                <!-- ===================== Layout: Topo / Centro / Rodapé ===================== -->
                <div class="grid_topo_centro_rodape row">
                    <div class="boas_vindas_cabecalho col s12"></div>
                    <div class="boas_vindas_conteudo col s12"></div>
                    <div class="boas_vindas_rodape col s12">
                        <p class="boas_vindas_rodape_copyright">&copy; 2017 SHL Soluções</p>
                    </div>
                </div>

            </div>
            <!-- /container boas_vindas -->

            <!-- ===================== Inputs Hidden ===================== -->
            <div id="div-input-hidden" class="hide">
                <input type="hidden" value="mod=41&func=1490" placeholder=" " id="rota"                  name="rota">
                <input type="hidden" value=""                 placeholder=" " id="elementoTroca"         name="elementoTroca">
                <input type="hidden" value="0"               placeholder=" " id="modoApresentacao"       name="modoApresentacao">
                <input type="hidden" value=""                 placeholder=" " id="botaoAcao"              name="botaoAcao">
                <input type="hidden" value=""                 placeholder=" " id="coletarValores"         name="coletarValores">
                <input type="hidden" value=""                 placeholder=" " id="campoRefresh"           name="campoRefresh">
                <input type="hidden" value=""                 placeholder=" " id="logOut"                 name="logOut">
                <input type="hidden" value=""                 placeholder=" " id="mostrarModalFormulario" name="mostrarModalFormulario">
                <input type="hidden" value="www.eship.com.br" placeholder=" " id="host"                  name="host">
                <input type="hidden" value=""                 placeholder=" " id="foco"                   name="foco">
                <input type="hidden" value=""                 placeholder=" " id="inputFoto"              name="inputFoto">
            </div>

        </form>

        <div id="modalFlutuanteIFrame" class="modal altura_tela largura_grande">
            <div class="modal-content">

        </div>

        <!-- ===================== Modal: Mensagens ===================== -->
        <div id="mensagens" class="modal largura_media modal-fixed-header">
            <div class="modal-header">
                <div class="barra_superior sem_fundo">
                    <span>Mensagens:</span>
                    <div onclick="javascript: FecharModalAtual();" class="right icone_fechar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
                            <path d="M38 12.83L35.17 10 24 21.17 12.83 10 10 12.83 21.17 24 10 35.17 12.83 38 24 26.83 35.17 38 38 35.17 26.83 24z"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="modal-content">
                <div>
                    <input type="hidden" value="0" placeholder=" " id="msgAppAndroid" name="msgAppAndroid">
                </div>
            </div>
        </div>

        <!-- ===================== Modal: Debug ===================== -->
        <div id="modal_debug" class="modal altura_tela largura_tela abaixo_menu_cabecalho modal-fixed-header">
            <div class="modal-header">
                <div class="barra_superior fundo_branco">
                    <span>Debug:</span>
                    <div onclick="javascript: FecharModalAtual();" class="right icone_fechar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
                            <path d="M38 12.83L35.17 10 24 21.17 12.83 10 10 12.83 21.17 24 10 35.17 12.83 38 24 26.83 35.17 38 38 35.17 26.83 24z"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="modal-content">
                <div></div>
            </div>
        </div>

    </main>
